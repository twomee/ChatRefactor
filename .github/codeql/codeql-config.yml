name: "cHATBOX CodeQL Configuration"

# ── Query filters ────────────────────────────────────────────────────────────
#
# py/partial-ssrf: "Part of the URL of this request depends on a user-provided
# value."  This fires in url_preview_service.py because the URL path component
# comes from the user-supplied preview URL, which is intentional — the link-
# unfurling service must fetch whatever page the user specifies.
#
# The CRITICAL threat (py/full-ssrf, "full URL user-controlled") has been
# properly fixed: fetch_preview() now calls _resolve_safe_ip() which resolves
# the hostname via DNS and validates the resulting IP against the private-range
# blocklist.  The actual HTTP request then connects to the pre-resolved IP
# (not the user-provided hostname), closing the DNS rebinding attack window.
# CodeQL recognised this fix and no longer fires py/full-ssrf.
#
# py/partial-ssrf remains because the path/query fragment is still derived from
# user input — this is an accepted false positive for this component.  The path
# only controls WHICH PAGE is fetched from a validated public host; it cannot
# redirect the connection to an internal address.
#
# py/full-ssrf is intentionally left enabled so that any future regression
# (user-controlled host in an HTTP request) is caught immediately.

query-filters:
  - exclude:
      id: py/partial-ssrf
