name: CI — File Service

on:
  push:
    branches: [main, microservices]
    paths:
      - "services/file-service/**"
      - ".github/workflows/ci-file.yml"
  pull_request:
    branches: [main, microservices]
    paths:
      - "services/file-service/**"
      - ".github/workflows/ci-file.yml"

concurrency:
  group: ci-file-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  lint:
    name: File Service Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/file-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: services/file-service/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript build check
        run: npx tsc --noEmit

  test:
    name: File Service Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/file-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: services/file-service/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        env:
          APP_ENV: test
          SECRET_KEY: test-secret-key-for-ci-only
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          KAFKA_BOOTSTRAP_SERVERS: localhost:9092
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: services/file-service/coverage/lcov.info
          flags: file-service
          fail_ci_if_error: false

  docker-build:
    name: File Service Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Build file-service image
        run: docker build -t chatbox-file:ci ./services/file-service
