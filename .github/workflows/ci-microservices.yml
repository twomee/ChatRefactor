name: CI — Microservices Integration

on:
  push:
    branches: [main, microservices]
    paths:
      - "docker-compose.yml"
      - "kong/**"
      - "docker/**"
  pull_request:
    branches: [main, microservices]
    paths:
      - "docker-compose.yml"
      - "kong/**"
      - "docker/**"

concurrency:
  group: ci-microservices-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-compose-build:
    name: Docker Compose Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate Kong config syntax
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE/kong/kong.yml:/etc/kong/kong.yml:ro" \
            -e KONG_DATABASE=off \
            -e KONG_DECLARATIVE_CONFIG=/etc/kong/kong.yml \
            kong:3.6 kong config parse /etc/kong/kong.yml
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}

      - name: Build all microservice images
        run: docker compose build
        env:
          POSTGRES_PASSWORD: ci_test_password
          SECRET_KEY: ci-test-secret-key
          ADMIN_USERNAME: testadmin
          ADMIN_PASSWORD: testpassword

      - name: Verify images were created
        run: |
          docker compose config --services
