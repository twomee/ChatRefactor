name: CI — Microservices Integration

on:
  push:
    branches: [main, microservices]
    paths:
      - "docker-compose.yml"
      - "infra/kong/**"
      - "infra/docker/**"
  pull_request:
    branches: [main, microservices]
    paths:
      - "docker-compose.yml"
      - "infra/kong/**"
      - "infra/docker/**"

concurrency:
  group: ci-microservices-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-kong:
    name: Validate Kong Config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate Kong config syntax
        run: |
          docker run --rm \
            -v "$PWD/infra/kong/kong.yml:/etc/kong/kong.yml:ro" \
            -e KONG_DATABASE=off \
            -e KONG_DECLARATIVE_CONFIG=/etc/kong/kong.yml \
            kong:3.6 kong config parse /etc/kong/kong.yml

  validate-compose:
    name: Validate Docker Compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate compose file syntax
        run: docker compose config --quiet
        env:
          POSTGRES_PASSWORD: ci_test_password
          REDIS_PASSWORD: ci_test_redis_password
          SECRET_KEY: ci-test-secret-key
          ADMIN_USERNAME: testadmin
          ADMIN_PASSWORD: testpassword

      - name: List configured services
        run: docker compose config --services
        env:
          POSTGRES_PASSWORD: ci_test_password
          REDIS_PASSWORD: ci_test_redis_password
          SECRET_KEY: ci-test-secret-key
          ADMIN_USERNAME: testadmin
          ADMIN_PASSWORD: testpassword
