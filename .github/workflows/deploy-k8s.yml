name: Deploy to K8s

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - prod
      image_tag:
        description: 'Image tag to deploy (default: latest)'
        required: false
        default: 'latest'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: "5.4.3"

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config

      - name: Update image tags
        run: |
          cd infra/k8s/overlays/${{ github.event.inputs.environment }}
          for svc in auth-service chat-service message-service file-service frontend; do
            kustomize edit set image ${svc}=${{ secrets.DOCKERHUB_USERNAME }}/chatbox-${svc}:${{ github.event.inputs.image_tag }}
          done

      - name: Deploy
        run: |
          kubectl apply -k infra/k8s/overlays/${{ github.event.inputs.environment }}

      - name: Wait for rollout
        run: |
          for svc in auth-service chat-service message-service file-service frontend kong; do
            echo "Waiting for $svc..."
            kubectl rollout status deployment/$svc --namespace chatbox --timeout=300s
          done

      - name: Smoke test
        run: |
          echo "Running health checks..."
          for svc in auth-service chat-service message-service file-service; do
            kubectl exec deployment/$svc -n chatbox -- curl -sf http://localhost:$(kubectl get svc $svc -n chatbox -o jsonpath='{.spec.ports[0].port}')/health || { echo "Health check failed for $svc"; exit 1; }
          done
