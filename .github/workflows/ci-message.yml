name: CI — Message Service

on:
  push:
    branches: [main, microservices]
    paths:
      - "services/message-service/**"
      - ".github/workflows/ci-message.yml"
  pull_request:
    branches: [main, microservices]
    paths:
      - "services/message-service/**"
      - ".github/workflows/ci-message.yml"

concurrency:
  group: ci-message-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Message Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/message-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff linter
        run: ruff check app/

      - name: Run Ruff formatter check
        run: ruff format --check app/

  test:
    name: Message Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/message-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/message-service/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        env:
          APP_ENV: test
          SECRET_KEY: test-secret-key-for-ci-only
          DATABASE_URL: sqlite:///./test.db
          KAFKA_BOOTSTRAP_SERVERS: localhost:29092
          AUTH_SERVICE_URL: http://localhost:8001
        run: pytest tests/ -v --tb=short --cov=app --cov-report=term-missing --cov-report=xml:coverage.xml --cov-fail-under=50

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: services/message-service/coverage.xml
          flags: message-service
          fail_ci_if_error: false

  docker-build:
    name: Message Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Build message-service image
        run: docker build -t chatbox-message:ci ./services/message-service
