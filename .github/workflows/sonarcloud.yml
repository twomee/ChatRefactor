name: SonarCloud Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: sonarcloud-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  sonarcloud:
    name: SonarCloud Scan
    # Skip on Dependabot PRs — GitHub does not expose secrets to
    # Dependabot-triggered workflows for security reasons.
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Full history needed for blame/new code detection

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Generate frontend coverage report
        working-directory: frontend
        run: npm run test -- --coverage --reporter=default

      - name: Install file-service dependencies
        working-directory: services/file-service
        run: npm ci

      - name: Generate file-service coverage report
        working-directory: services/file-service
        run: npm run test:coverage

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: services/chat-service/go.sum

      - name: Generate chat-service coverage report
        working-directory: services/chat-service
        run: |
          go test ./internal/... -coverprofile=coverage.out -covermode=atomic
          # SonarCloud resolves Go paths relative to the project root.
          # Replace the module import path prefix with the project-relative path.
          sed -i 's|github.com/twomee/chatbox/chat-service/|services/chat-service/|g' coverage.out

      - name: Generate auth-service coverage report
        working-directory: services/auth-service
        run: pip install -r requirements.txt && python3 -m pytest --cov=app --cov-report=xml:coverage.xml -q

      - name: Generate message-service coverage report
        working-directory: services/message-service
        run: pip install -r requirements.txt && python3 -m pytest --cov=app --cov-report=xml:coverage.xml -q

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
