name: SonarCloud Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: sonarcloud-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sonarcloud:
    name: SonarCloud Scan
    # Skip on Dependabot PRs — GitHub does not expose secrets to
    # Dependabot-triggered workflows for security reasons.
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history needed for blame/new code detection

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Generate frontend coverage report
        working-directory: frontend
        run: npm run test -- --coverage --reporter=default

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate auth-service coverage report
        working-directory: services/auth-service
        run: pip install -r requirements.txt && python3 -m pytest --cov=app --cov-report=xml:coverage.xml -q

      - name: Generate message-service coverage report
        working-directory: services/message-service
        run: pip install -r requirements.txt && python3 -m pytest --cov=app --cov-report=xml:coverage.xml -q

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
