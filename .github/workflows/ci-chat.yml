name: CI — Chat Service

on:
  push:
    branches: [main, microservices]
    paths:
      - "services/chat-service/**"
      - ".github/workflows/ci-chat.yml"
  pull_request:
    branches: [main, microservices]
    paths:
      - "services/chat-service/**"
      - ".github/workflows/ci-chat.yml"

concurrency:
  group: ci-chat-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Chat Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/chat-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"

      - name: Download dependencies
        run: go mod download

      - name: Run go vet
        run: go vet ./...

      - name: Run go build check
        run: go build ./...

  test:
    name: Chat Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/chat-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"

      - name: Run tests with coverage
        env:
          APP_ENV: test
          SECRET_KEY: test-secret-key-for-ci-only
        run: go test ./... -v -count=1 -coverprofile=coverage.out -covermode=atomic -coverpkg=./internal/...

      - name: Check coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 80" | bc -l) )); then
            echo "FAIL: Coverage ${COVERAGE}% is below 80% threshold"
            exit 1
          fi

  docker-build:
    name: Chat Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Build chat-service image
        run: docker build -t chatbox-chat:ci ./services/chat-service
