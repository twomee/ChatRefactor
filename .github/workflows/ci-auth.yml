name: CI — Auth Service

on:
  push:
    branches: [main, microservices]
    paths:
      - "services/auth-service/**"
      - ".github/workflows/ci-auth.yml"
  pull_request:
    branches: [main, microservices]
    paths:
      - "services/auth-service/**"
      - ".github/workflows/ci-auth.yml"

concurrency:
  group: ci-auth-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Auth Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/auth-service
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff linter
        run: ruff check app/

      - name: Run Ruff formatter check
        run: ruff format --check app/

  test:
    name: Auth Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/auth-service
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/auth-service/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        env:
          APP_ENV: test
          SECRET_KEY: test-secret-key-for-ci-only
          ADMIN_USERNAME: testadmin
          ADMIN_PASSWORD: testpassword
          DATABASE_URL: sqlite:///./test.db
          REDIS_URL: redis://localhost:6379/0
          KAFKA_BOOTSTRAP_SERVERS: localhost:29092
        run: pytest tests/ -v --tb=short --cov=app --cov-report=term-missing --cov-fail-under=50

  docker-build:
    name: Auth Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v6

      - name: Build auth-service image
        run: docker build -t chatbox-auth:ci ./services/auth-service
