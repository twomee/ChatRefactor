<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>cHATBOX Microservices Architecture</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    min-height: 100vh;
    overflow-x: auto;
  }
  .diagram-wrapper {
    display: flex;
    justify-content: center;
    padding: 32px 16px 64px;
  }
  svg text {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  }
  /* Tooltip styles */
  .annotation {
    opacity: 0;
    transition: opacity 0.2s ease;
    pointer-events: none;
  }
  .hover-trigger:hover + .annotation,
  .hover-trigger:hover ~ .annotation {
    opacity: 1;
  }
</style>
</head>
<body>
<div class="diagram-wrapper">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1520" width="1400" height="1520">
  <defs>
    <!-- Arrowhead markers -->
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f87171"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/>
    </marker>
    <marker id="arrow-teal" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2dd4bf"/>
    </marker>
    <marker id="arrow-rose" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fb7185"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#60a5fa"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4ade80"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c084fc"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fb923c"/>
    </marker>

    <!-- Glow filters -->
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#3b82f6" flood-opacity="0.3"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#22c55e" flood-opacity="0.3"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-purple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#a855f7" flood-opacity="0.3"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#f97316" flood-opacity="0.3"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#06b6d4" flood-opacity="0.3"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-amber" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#f59e0b" flood-opacity="0.3"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-rose" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#f43f5e" flood-opacity="0.3"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Rounded rect clip for badges -->
    <clipPath id="clip-badge">
      <rect rx="4" ry="4"/>
    </clipPath>
  </defs>

  <!-- ============================================================ -->
  <!-- BACKGROUND GRID -->
  <!-- ============================================================ -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
  </pattern>
  <rect width="1400" height="1520" fill="url(#grid)"/>

  <!-- ============================================================ -->
  <!-- TITLE -->
  <!-- ============================================================ -->
  <text x="700" y="48" text-anchor="middle" font-size="28" font-weight="700" fill="#f1f5f9" letter-spacing="1">
    cHATBOX Microservices Architecture
  </text>
  <text x="700" y="72" text-anchor="middle" font-size="13" fill="#64748b">
    Event-driven | Database-per-service | API Gateway pattern
  </text>

  <!-- ============================================================ -->
  <!-- LAYER 1: CLIENT -->
  <!-- ============================================================ -->
  <!-- Layer label -->
  <text x="30" y="118" font-size="11" fill="#475569" font-weight="600" letter-spacing="2">CLIENT</text>
  <line x1="30" y1="124" x2="100" y2="124" stroke="#334155" stroke-width="1"/>

  <!-- Frontend box -->
  <rect x="500" y="100" width="400" height="70" rx="10" fill="#1e293b" stroke="#06b6d4" stroke-width="2" filter="url(#glow-cyan)"/>
  <text x="700" y="130" text-anchor="middle" font-size="16" font-weight="600" fill="#22d3ee">Frontend</text>
  <text x="700" y="150" text-anchor="middle" font-size="12" fill="#94a3b8">React | Vite | :3000</text>

  <!-- ============================================================ -->
  <!-- Arrow: Client -> Kong -->
  <!-- ============================================================ -->
  <line x1="700" y1="170" x2="700" y2="220" stroke="#64748b" stroke-width="2" marker-end="url(#arrow-gray)"/>
  <text x="712" y="200" font-size="10" fill="#64748b">HTTP / WS</text>

  <!-- ============================================================ -->
  <!-- LAYER 2: API GATEWAY -->
  <!-- ============================================================ -->
  <text x="30" y="248" font-size="11" fill="#475569" font-weight="600" letter-spacing="2">GATEWAY</text>
  <line x1="30" y1="254" x2="110" y2="254" stroke="#334155" stroke-width="1"/>

  <!-- Kong box -->
  <rect x="280" y="225" width="840" height="100" rx="10" fill="#1e293b" stroke="#06b6d4" stroke-width="2" filter="url(#glow-cyan)"/>
  <!-- Kong header bar -->
  <rect x="280" y="225" width="840" height="30" rx="10" fill="#164e63"/>
  <rect x="280" y="245" width="840" height="10" fill="#164e63"/>
  <text x="700" y="246" text-anchor="middle" font-size="14" font-weight="700" fill="#22d3ee">Kong API Gateway</text>
  <text x="700" y="264" text-anchor="middle" font-size="11" fill="#67e8f9">:80</text>

  <!-- Plugin badges -->
  <rect x="370" y="278" width="80" height="22" rx="4" fill="#0e7490" opacity="0.6"/>
  <text x="410" y="293" text-anchor="middle" font-size="10" fill="#a5f3fc">CORS</text>

  <rect x="464" y="278" width="110" height="22" rx="4" fill="#0e7490" opacity="0.6"/>
  <text x="519" y="293" text-anchor="middle" font-size="10" fill="#a5f3fc">Rate Limiting</text>

  <rect x="588" y="278" width="110" height="22" rx="4" fill="#0e7490" opacity="0.6"/>
  <text x="643" y="293" text-anchor="middle" font-size="10" fill="#a5f3fc">X-Request-ID</text>

  <!-- Route labels inside Kong -->
  <text x="770" y="293" font-size="10" fill="#94a3b8">Routes:</text>
  <text x="818" y="293" font-size="10" fill="#60a5fa">/auth/*</text>
  <text x="864" y="293" font-size="10" fill="#4ade80">/rooms /ws /admin/*</text>
  <text x="990" y="293" font-size="10" fill="#c084fc">/messages/*</text>
  <text x="1060" y="293" font-size="10" fill="#fb923c">/files/*</text>

  <!-- ============================================================ -->
  <!-- Arrows: Kong -> Services -->
  <!-- ============================================================ -->
  <!-- Kong -> Auth -->
  <line x1="420" y1="325" x2="260" y2="420" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)" opacity="0.7"/>
  <text x="310" y="370" font-size="9" fill="#60a5fa" transform="rotate(-25,310,370)">/auth/*</text>

  <!-- Kong -> Chat -->
  <line x1="560" y1="325" x2="530" y2="420" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow-green)" opacity="0.7"/>
  <text x="530" y="378" font-size="9" fill="#4ade80">/rooms /ws /admin/*</text>

  <!-- Kong -> Message -->
  <line x1="820" y1="325" x2="850" y2="420" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrow-purple)" opacity="0.7"/>
  <text x="830" y="378" font-size="9" fill="#c084fc">/messages/*</text>

  <!-- Kong -> File -->
  <line x1="960" y1="325" x2="1120" y2="420" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrow-orange)" opacity="0.7"/>
  <text x="1060" y="370" font-size="9" fill="#fb923c" transform="rotate(25,1060,370)">/files/*</text>

  <!-- ============================================================ -->
  <!-- LAYER 3: MICROSERVICES -->
  <!-- ============================================================ -->
  <text x="30" y="448" font-size="11" fill="#475569" font-weight="600" letter-spacing="2">SERVICES</text>
  <line x1="30" y1="454" x2="110" y2="454" stroke="#334155" stroke-width="1"/>

  <!-- Service 1: Auth (Blue) -->
  <g>
    <rect x="100" y="425" width="280" height="130" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="2" filter="url(#glow-blue)"/>
    <rect x="100" y="425" width="280" height="32" rx="10" fill="#1e3a5f"/>
    <rect x="100" y="447" width="280" height="10" fill="#1e3a5f"/>
    <text x="240" y="448" text-anchor="middle" font-size="14" font-weight="700" fill="#60a5fa">Auth Service</text>
    <text x="240" y="476" text-anchor="middle" font-size="12" fill="#94a3b8">FastAPI | Python | :8001</text>
    <text x="240" y="496" text-anchor="middle" font-size="11" fill="#64748b">JWT auth, user management</text>

    <!-- Circuit breaker badge -->
    <rect x="140" y="510" width="200" height="20" rx="4" fill="#7c2d12" opacity="0.7"/>
    <text x="240" y="524" text-anchor="middle" font-size="10" fill="#fdba74">gobreaker circuit breaker target</text>
  </g>

  <!-- Service 2: Chat & Room (Green) -->
  <g>
    <rect x="410" y="425" width="280" height="130" rx="10" fill="#1e293b" stroke="#22c55e" stroke-width="2" filter="url(#glow-green)"/>
    <rect x="410" y="425" width="280" height="32" rx="10" fill="#14332a"/>
    <rect x="410" y="447" width="280" height="10" fill="#14332a"/>
    <text x="550" y="448" text-anchor="middle" font-size="14" font-weight="700" fill="#4ade80">Chat &amp; Room Service</text>
    <text x="550" y="476" text-anchor="middle" font-size="12" fill="#94a3b8">Go | Gin | :8003</text>
    <text x="550" y="496" text-anchor="middle" font-size="11" fill="#64748b">Rooms, WebSocket, admin</text>

    <!-- WS annotation badge -->
    <rect x="440" y="510" width="220" height="20" rx="4" fill="#14532d" opacity="0.7"/>
    <text x="550" y="524" text-anchor="middle" font-size="10" fill="#86efac">WS close code 1001 on shutdown</text>
  </g>

  <!-- Service 3: Message (Purple) -->
  <g>
    <rect x="720" y="425" width="280" height="130" rx="10" fill="#1e293b" stroke="#a855f7" stroke-width="2" filter="url(#glow-purple)"/>
    <rect x="720" y="425" width="280" height="32" rx="10" fill="#2e1065"/>
    <rect x="720" y="447" width="280" height="10" fill="#2e1065"/>
    <text x="860" y="448" text-anchor="middle" font-size="14" font-weight="700" fill="#c084fc">Message Service</text>
    <text x="860" y="476" text-anchor="middle" font-size="12" fill="#94a3b8">FastAPI | Python | :8004</text>
    <text x="860" y="496" text-anchor="middle" font-size="11" fill="#64748b">Message persistence, history</text>

    <!-- DLQ badge -->
    <rect x="770" y="510" width="180" height="20" rx="4" fill="#581c87" opacity="0.7"/>
    <text x="860" y="524" text-anchor="middle" font-size="10" fill="#d8b4fe">Produces to chat.dlq on fail</text>
  </g>

  <!-- Service 4: File (Orange) -->
  <g>
    <rect x="1030" y="425" width="280" height="130" rx="10" fill="#1e293b" stroke="#f97316" stroke-width="2" filter="url(#glow-orange)"/>
    <rect x="1030" y="425" width="280" height="32" rx="10" fill="#431407"/>
    <rect x="1030" y="447" width="280" height="10" fill="#431407"/>
    <text x="1170" y="448" text-anchor="middle" font-size="14" font-weight="700" fill="#fb923c">File Service</text>
    <text x="1170" y="476" text-anchor="middle" font-size="12" fill="#94a3b8">Express | Node.js | :8005</text>
    <text x="1170" y="496" text-anchor="middle" font-size="11" fill="#64748b">Upload, download, storage</text>
  </g>

  <!-- ============================================================ -->
  <!-- INTER-SERVICE REST CALLS (dashed red) -->
  <!-- ============================================================ -->
  <!-- Chat -> Auth (user lookup) -->
  <path d="M 410,470 C 390,470 390,470 380,470" stroke="#f87171" stroke-width="1.5" stroke-dasharray="6,3" fill="none" marker-end="url(#arrow-red)"/>
  <text x="345" y="464" font-size="9" fill="#fca5a5">user lookup</text>

  <!-- Chat -> Message (history) -->
  <path d="M 690,480 L 720,480" stroke="#f87171" stroke-width="1.5" stroke-dasharray="6,3" fill="none" marker-end="url(#arrow-red)"/>
  <text x="690" y="473" font-size="9" fill="#fca5a5">history</text>

  <!-- Message -> Auth (PM username resolve) -->
  <path d="M 720,500 C 600,540 450,540 380,500" stroke="#f87171" stroke-width="1.5" stroke-dasharray="6,3" fill="none" marker-end="url(#arrow-red)"/>
  <text x="520" y="550" font-size="9" fill="#fca5a5">PM username resolve</text>

  <!-- ============================================================ -->
  <!-- LAYER 4: DATABASES -->
  <!-- ============================================================ -->
  <text x="30" y="630" font-size="11" fill="#475569" font-weight="600" letter-spacing="2">DATABASES</text>
  <line x1="30" y1="636" x2="120" y2="636" stroke="#334155" stroke-width="1"/>

  <!-- Database-per-service annotation -->
  <rect x="130" y="616" width="280" height="20" rx="4" fill="#134e4a" opacity="0.5"/>
  <text x="270" y="630" text-anchor="middle" font-size="10" fill="#5eead4">Each service owns its database (no cross-DB access)</text>

  <!-- DB: chatbox_auth -->
  <g>
    <ellipse cx="240" cy="688" rx="100" ry="14" fill="#0d3d4a" stroke="#14b8a6" stroke-width="1.5"/>
    <rect x="140" y="688" width="200" height="40" fill="#0d3d4a" stroke="#14b8a6" stroke-width="1.5"/>
    <line x1="140" y1="688" x2="140" y2="728" stroke="#0d3d4a" stroke-width="2"/>
    <line x1="340" y1="688" x2="340" y2="728" stroke="#0d3d4a" stroke-width="2"/>
    <ellipse cx="240" cy="728" rx="100" ry="14" fill="#0d3d4a" stroke="#14b8a6" stroke-width="1.5"/>
    <text x="240" y="713" text-anchor="middle" font-size="12" font-weight="600" fill="#2dd4bf">chatbox_auth</text>
    <text x="240" y="752" text-anchor="middle" font-size="10" fill="#5eead4">PostgreSQL</text>
  </g>

  <!-- DB: chatbox_chat -->
  <g>
    <ellipse cx="550" cy="688" rx="100" ry="14" fill="#0d3d4a" stroke="#14b8a6" stroke-width="1.5"/>
    <rect x="450" y="688" width="200" height="40" fill="#0d3d4a" stroke="#14b8a6" stroke-width="1.5"/>
    <line x1="450" y1="688" x2="450" y2="728" stroke="#0d3d4a" stroke-width="2"/>
    <line x1="650" y1="688" x2="650" y2="728" stroke="#0d3d4a" stroke-width="2"/>
    <ellipse cx="550" cy="728" rx="100" ry="14" fill="#0d3d4a" stroke="#14b8a6" stroke-width="1.5"/>
    <text x="550" y="713" text-anchor="middle" font-size="12" font-weight="600" fill="#2dd4bf">chatbox_chat</text>
    <text x="550" y="752" text-anchor="middle" font-size="10" fill="#5eead4">PostgreSQL</text>
  </g>

  <!-- DB: chatbox_messages -->
  <g>
    <ellipse cx="860" cy="688" rx="100" ry="14" fill="#0d3d4a" stroke="#14b8a6" stroke-width="1.5"/>
    <rect x="760" y="688" width="200" height="40" fill="#0d3d4a" stroke="#14b8a6" stroke-width="1.5"/>
    <line x1="760" y1="688" x2="760" y2="728" stroke="#0d3d4a" stroke-width="2"/>
    <line x1="960" y1="688" x2="960" y2="728" stroke="#0d3d4a" stroke-width="2"/>
    <ellipse cx="860" cy="728" rx="100" ry="14" fill="#0d3d4a" stroke="#14b8a6" stroke-width="1.5"/>
    <text x="860" y="713" text-anchor="middle" font-size="12" font-weight="600" fill="#2dd4bf">chatbox_messages</text>
    <text x="860" y="752" text-anchor="middle" font-size="10" fill="#5eead4">PostgreSQL</text>
  </g>

  <!-- DB: chatbox_files -->
  <g>
    <ellipse cx="1170" cy="688" rx="100" ry="14" fill="#0d3d4a" stroke="#14b8a6" stroke-width="1.5"/>
    <rect x="1070" y="688" width="200" height="40" fill="#0d3d4a" stroke="#14b8a6" stroke-width="1.5"/>
    <line x1="1070" y1="688" x2="1070" y2="728" stroke="#0d3d4a" stroke-width="2"/>
    <line x1="1270" y1="688" x2="1270" y2="728" stroke="#0d3d4a" stroke-width="2"/>
    <ellipse cx="1170" cy="728" rx="100" ry="14" fill="#0d3d4a" stroke="#14b8a6" stroke-width="1.5"/>
    <text x="1170" y="713" text-anchor="middle" font-size="12" font-weight="600" fill="#2dd4bf">chatbox_files</text>
    <text x="1170" y="752" text-anchor="middle" font-size="10" fill="#5eead4">PostgreSQL</text>
  </g>

  <!-- Arrows: Services -> DBs -->
  <line x1="240" y1="555" x2="240" y2="674" stroke="#14b8a6" stroke-width="1.5" marker-end="url(#arrow-teal)" opacity="0.6"/>
  <line x1="550" y1="555" x2="550" y2="674" stroke="#14b8a6" stroke-width="1.5" marker-end="url(#arrow-teal)" opacity="0.6"/>
  <line x1="860" y1="555" x2="860" y2="674" stroke="#14b8a6" stroke-width="1.5" marker-end="url(#arrow-teal)" opacity="0.6"/>
  <line x1="1170" y1="555" x2="1170" y2="674" stroke="#14b8a6" stroke-width="1.5" marker-end="url(#arrow-teal)" opacity="0.6"/>

  <!-- ============================================================ -->
  <!-- LAYER 5: REDIS -->
  <!-- ============================================================ -->
  <text x="30" y="818" font-size="11" fill="#475569" font-weight="600" letter-spacing="2">CACHE</text>
  <line x1="30" y1="824" x2="90" y2="824" stroke="#334155" stroke-width="1"/>

  <!-- Redis zone background -->
  <rect x="130" y="790" width="580" height="130" rx="12" fill="#1c1017" stroke="#f43f5e" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>
  <text x="150" y="810" font-size="11" fill="#fb7185" font-weight="600">Redis</text>

  <!-- Redis box -->
  <g>
    <rect x="330" y="820" width="200" height="80" rx="10" fill="#1e293b" stroke="#f43f5e" stroke-width="2" filter="url(#glow-rose)"/>
    <text x="430" y="850" text-anchor="middle" font-size="16" font-weight="700" fill="#fb7185">Redis</text>
    <text x="430" y="870" text-anchor="middle" font-size="12" fill="#94a3b8">In-Memory Store | :6379</text>
  </g>

  <!-- Auth -> Redis -->
  <path d="M 240,555 L 240,770 C 240,790 260,820 330,845" stroke="#fb7185" stroke-width="1.5" fill="none" marker-end="url(#arrow-rose)" opacity="0.7"/>
  <!-- Auth-Redis label group -->
  <rect x="140" y="776" width="180" height="42" rx="4" fill="#1e293b" stroke="#881337" stroke-width="1" opacity="0.9"/>
  <text x="230" y="792" text-anchor="middle" font-size="10" fill="#fda4af">Token blacklist</text>
  <text x="230" y="804" text-anchor="middle" font-size="10" fill="#fda4af">TTL = 24h</text>
  <text x="230" y="816" text-anchor="middle" font-size="9" fill="#9f1239">fail-closed prod | fail-open dev</text>

  <!-- Chat -> Redis -->
  <path d="M 550,555 L 550,770 C 550,790 540,820 530,845" stroke="#fb7185" stroke-width="1.5" fill="none" marker-end="url(#arrow-rose)" opacity="0.7"/>
  <rect x="555" y="790" width="130" height="22" rx="4" fill="#1e293b" stroke="#881337" stroke-width="1" opacity="0.9"/>
  <text x="620" y="805" text-anchor="middle" font-size="10" fill="#fda4af">Readiness probes</text>

  <!-- ============================================================ -->
  <!-- LAYER 6: KAFKA -->
