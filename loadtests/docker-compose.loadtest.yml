# Extends the main docker-compose.yml to add Locust load testing.
#
# Usage:
#   docker compose -f docker-compose.yml -f loadtests/docker-compose.loadtest.yml up
#
# Access Locust dashboard at http://localhost:8089

services:
  locust-master:
    build:
      context: ./loadtests
      dockerfile: Dockerfile.locust
    ports:
      - "8089:8089"
    environment:
      - LOADTEST_API_BASE=http://backend:8000
      - LOADTEST_WS_BASE=ws://backend:8000
      - LOADTEST_NUM_USERS=200
      - ADMIN_USERNAME=${ADMIN_USERNAME:-ido}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-changeme}
    command: >
      locust -f scenarios/http_endpoints.py
      --master
      --host=http://backend:8000
    volumes:
      - ./loadtests/reports:/loadtests/reports
    depends_on:
      backend:
        condition: service_healthy

  locust-worker:
    build:
      context: ./loadtests
      dockerfile: Dockerfile.locust
    environment:
      - LOADTEST_API_BASE=http://backend:8000
      - LOADTEST_WS_BASE=ws://backend:8000
      - LOADTEST_NUM_USERS=200
      - ADMIN_USERNAME=${ADMIN_USERNAME:-ido}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-changeme}
    command: >
      locust -f scenarios/http_endpoints.py
      --worker
      --master-host=locust-master
    depends_on:
      - locust-master
    deploy:
      replicas: 4
