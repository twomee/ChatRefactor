apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: chatbox
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: chatbox
    app.kubernetes.io/component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend
        app.kubernetes.io/part-of: chatbox
        app.kubernetes.io/component: frontend
    spec:
      serviceAccountName: frontend
      securityContext:
        runAsNonRoot: false
        fsGroup: 1000
      containers:
        - name: frontend
          image: frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              protocol: TCP
          env:
            - name: VITE_API_BASE
              value: "http://localhost:30080"
            - name: VITE_WS_BASE
              value: "ws://localhost:30080"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
