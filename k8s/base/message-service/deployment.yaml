apiVersion: apps/v1
kind: Deployment
metadata:
  name: message-service
  namespace: chatbox
  labels:
    app.kubernetes.io/name: message-service
    app.kubernetes.io/part-of: chatbox
    app.kubernetes.io/component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: message-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: message-service
        app.kubernetes.io/part-of: chatbox
        app.kubernetes.io/component: backend
    spec:
      serviceAccountName: message-service
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - 'until nc -z postgres-postgresql.chatbox-infra.svc.cluster.local 5432; do echo "Waiting for Postgres..."; sleep 2; done'
          securityContext:
            allowPrivilegeEscalation: false
        - name: wait-for-kafka
          image: busybox:1.36
          command:
            - sh
            - -c
            - 'until nc -z kafka.chatbox-infra.svc.cluster.local 9092; do echo "Waiting for Kafka..."; sleep 2; done'
          securityContext:
            allowPrivilegeEscalation: false
        - name: run-migrations
          image: message-service:latest
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - configMapRef:
                name: chatbox-shared-config
            - secretRef:
                name: chatbox-infra-secrets
            - secretRef:
                name: message-service-secrets
          securityContext:
            allowPrivilegeEscalation: false
      containers:
        - name: message-service
          image: message-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8004
              protocol: TCP
          envFrom:
            - configMapRef:
                name: chatbox-shared-config
            - secretRef:
                name: chatbox-infra-secrets
            - secretRef:
                name: message-service-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 8004
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8004
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
