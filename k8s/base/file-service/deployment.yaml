apiVersion: apps/v1
kind: Deployment
metadata:
  name: file-service
  namespace: chatbox
  labels:
    app.kubernetes.io/name: file-service
    app.kubernetes.io/part-of: chatbox
    app.kubernetes.io/component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: file-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: file-service
        app.kubernetes.io/part-of: chatbox
        app.kubernetes.io/component: backend
    spec:
      serviceAccountName: file-service
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - 'until nc -z postgres-postgresql.chatbox-infra.svc.cluster.local 5432; do echo "Waiting for Postgres..."; sleep 2; done'
          securityContext:
            allowPrivilegeEscalation: false
        - name: wait-for-kafka
          image: busybox:1.36
          command:
            - sh
            - -c
            - 'until nc -z kafka.chatbox-infra.svc.cluster.local 9092; do echo "Waiting for Kafka..."; sleep 2; done'
          securityContext:
            allowPrivilegeEscalation: false
        - name: run-migrations
          image: file-service:latest
          command: ["npx", "prisma", "migrate", "deploy"]
          envFrom:
            - configMapRef:
                name: chatbox-shared-config
            - secretRef:
                name: chatbox-infra-secrets
            - configMapRef:
                name: file-service-config
            - secretRef:
                name: file-service-secrets
          securityContext:
            allowPrivilegeEscalation: false
      containers:
        - name: file-service
          image: file-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8005
              protocol: TCP
          envFrom:
            - configMapRef:
                name: chatbox-shared-config
            - secretRef:
                name: chatbox-infra-secrets
            - configMapRef:
                name: file-service-config
            - secretRef:
                name: file-service-secrets
          volumeMounts:
            - name: file-uploads
              mountPath: /app/uploads
          livenessProbe:
            httpGet:
              path: /health
              port: 8005
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8005
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
      volumes:
        - name: file-uploads
          persistentVolumeClaim:
            claimName: file-uploads-pvc
