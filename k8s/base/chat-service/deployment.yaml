apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-service
  namespace: chatbox
  labels:
    app.kubernetes.io/name: chat-service
    app.kubernetes.io/part-of: chatbox
    app.kubernetes.io/component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: chat-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: chat-service
        app.kubernetes.io/part-of: chatbox
        app.kubernetes.io/component: backend
    spec:
      serviceAccountName: chat-service
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - 'until nc -z postgres-postgresql.chatbox-infra.svc.cluster.local 5432; do echo "Waiting for Postgres..."; sleep 2; done'
          securityContext:
            allowPrivilegeEscalation: false
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - 'until nc -z redis-master.chatbox-infra.svc.cluster.local 6379; do echo "Waiting for Redis..."; sleep 2; done'
          securityContext:
            allowPrivilegeEscalation: false
        - name: wait-for-kafka
          image: busybox:1.36
          command:
            - sh
            - -c
            - 'until nc -z kafka.chatbox-infra.svc.cluster.local 9092; do echo "Waiting for Kafka..."; sleep 2; done'
          securityContext:
            allowPrivilegeEscalation: false
        - name: wait-for-auth
          image: busybox:1.36
          command:
            - sh
            - -c
            - 'until nc -z auth-service.chatbox.svc.cluster.local 8001; do echo "Waiting for Auth..."; sleep 2; done'
          securityContext:
            allowPrivilegeEscalation: false
      containers:
        - name: chat-service
          image: chat-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8003
              protocol: TCP
          envFrom:
            - configMapRef:
                name: chatbox-shared-config
            - secretRef:
                name: chatbox-infra-secrets
            - configMapRef:
                name: chat-service-config
            - secretRef:
                name: chat-service-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
      volumes:
        - name: tmp
          emptyDir: {}
