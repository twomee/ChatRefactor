## kube-prometheus-stack Helm values
## Install: helm install monitoring prometheus-community/kube-prometheus-stack
##          -n chatbox-monitoring -f k8s/infra/helm-values/monitoring.yaml

grafana:
  service:
    type: NodePort
    nodePort: 30030
  adminPassword: admin

prometheus:
  prometheusSpec:
    retention: 7d
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 10Gi

alertmanager:
  enabled: false
