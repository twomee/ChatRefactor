apiVersion: batch/v1
kind: Job
metadata:
  name: db-init
  namespace: chatbox
  labels:
    app.kubernetes.io/part-of: chatbox
    app.kubernetes.io/component: init
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z postgres-postgresql.chatbox-infra.svc.cluster.local 5432; do echo "Waiting for Postgres..."; sleep 2; done']
      containers:
        - name: db-init
          image: postgres:16-alpine
          env:
            - name: PGHOST
              value: "postgres-postgresql.chatbox-infra.svc.cluster.local"
            - name: PGPORT
              value: "5432"
            - name: PGUSER
              value: "postgres"
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: chatbox-infra-secrets
                  key: POSTGRES_PASSWORD
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "=== Creating per-service databases ==="
              for db in chatbox_auth chatbox_chat chatbox_messages chatbox_files; do
                echo "  Creating $db (if not exists)..."
                psql -d postgres -tc "SELECT 1 FROM pg_database WHERE datname = '$db'" | grep -q 1 \
                  || psql -d postgres -c "CREATE DATABASE $db"
              done

              echo "=== Granting chatbox user access to per-service databases ==="
              for db in chatbox_auth chatbox_chat chatbox_messages chatbox_files; do
                echo "  Granting access to $db..."
                psql -d postgres -c "GRANT CONNECT ON DATABASE $db TO chatbox;"
                psql -d "$db" -c "GRANT ALL PRIVILEGES ON SCHEMA public TO chatbox;"
                psql -d "$db" -c "ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO chatbox;"
                psql -d "$db" -c "ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO chatbox;"
              done

              echo "=== Database init complete — schemas handled by each service's migration tool ==="
