# Alembic configuration for Auth Service
[alembic]
# Path to migration scripts
script_location = alembic

# Template used to generate migration files
file_template = %%(rev)s_%%(slug)s

# Truncate revision to a shorter hash
truncate_slug_length = 40

# Timezone for migration timestamps
timezone = UTC

# SQLAlchemy URL — overridden at runtime by env.py from app.core.config
sqlalchemy.url = postgresql://chatbox:chatbox_pass@localhost:5432/chatbox_auth

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
