server {
    listen 80;
    server_name _;

    # Allow large file uploads (up to 200 MB, matching file-service limit)
    client_max_body_size 200m;

    # ── Security headers ──────────────────────────────────────────────
    # connect-src and img-src include http://localhost:* because VITE_API_BASE
    # resolves to http://localhost (Kong, port 80) while the SPA is on port 3000.
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self' http://localhost:* ws://localhost:*; img-src 'self' data: blob: http://localhost:*; style-src 'self' 'unsafe-inline'; script-src 'self'" always;
    # NOTE: HSTS disabled until HTTPS is properly configured.
    # Uncomment when TLS termination is in place:
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Frontend static files
    root /usr/share/nginx/html;
    index index.html;

    # ── API reverse-proxy ─────────────────────────────────────────────
    # All backend traffic is proxied to Kong so the browser sees a single
    # origin (same host:port as the SPA). This eliminates cross-origin
    # issues for img-src, connect-src, and CORS.

    location /auth {
        proxy_pass         http://kong:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    location /rooms {
        proxy_pass         http://kong:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    location /pm {
        proxy_pass         http://kong:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    location /messages {
        proxy_pass         http://kong:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    location /files {
        proxy_pass         http://kong:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    location /admin {
        proxy_pass         http://kong:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # WebSocket upgrade (chat & lobby)
    location /ws {
        proxy_pass             http://kong:8000;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade           $http_upgrade;
        proxy_set_header       Connection        "upgrade";
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_read_timeout     3600s;
        proxy_send_timeout     3600s;
    }

    # SPA fallback: all other routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
