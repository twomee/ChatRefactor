server {
    listen 80;
    server_name _;

    # ── Security headers ──────────────────────────────────────────────
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self' http://localhost:* ws://localhost:*; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self'" always;
    # NOTE: HSTS disabled until HTTPS is properly configured.
    # Uncomment when TLS termination is in place:
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Frontend static files
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: all other routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
