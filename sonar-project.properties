sonar.organization=twomee
sonar.projectKey=twomee_ChatRefactor

# Source directories (all services + frontend)
sonar.sources=services/auth-service/app,services/chat-service/internal,services/message-service/app,services/file-service/src,frontend/src,v1/backend

# Test directories
sonar.tests=services/auth-service/tests,services/chat-service/internal,services/message-service/tests,services/file-service/tests,frontend/tests,v1/backend/tests

# Exclude non-source files from analysis
sonar.exclusions=**/node_modules/**,**/venv/**,**/__pycache__/**,**/coverage/**,**/dist/**,**/build/**,**/*.test.*,**/*.spec.*,**/tests/**,**/test/**,k8s/**,infra/**,loadtests/**,docs/**

# Test inclusions (so SonarCloud knows which files are tests)
sonar.test.inclusions=**/*.test.*,**/*.spec.*,**/tests/**,**/test/**

# Language-specific settings
sonar.python.version=3.11
sonar.go.tests.reportPaths=services/chat-service/coverage.out

# Encoding
sonar.sourceEncoding=UTF-8
