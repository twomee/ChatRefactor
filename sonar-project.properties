sonar.organization=twomee
sonar.projectKey=twomee_ChatRefactor

# Source directories (all services + frontend)
sonar.sources=services/auth-service/app,services/chat-service/internal,services/message-service/app,services/file-service/src,frontend/src,v1/backend

# Test directories (only directories that exist and don't overlap with sonar.sources)
# Go tests and frontend tests live alongside source code, so they're identified via sonar.test.inclusions
sonar.tests=services/auth-service/tests,services/message-service/tests,services/file-service/tests,v1/backend/tests

# Exclude non-source files from analysis
sonar.exclusions=**/node_modules/**,**/venv/**,**/__pycache__/**,**/coverage/**,**/dist/**,**/build/**,**/*.test.*,**/*.spec.*,**/tests/**,**/test/**,infra/**,loadtests/**,docs/**

# Test inclusions (so SonarCloud knows which files are tests)
sonar.test.inclusions=**/*.test.*,**/*.spec.*,**/*_test.go,**/tests/**,**/test/**,**/__tests__/**

# Language-specific settings
sonar.python.version=3.11
sonar.go.coverage.reportPaths=services/chat-service/coverage.out
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.python.coverage.reportPaths=services/auth-service/coverage.xml,services/message-service/coverage.xml

# Encoding
sonar.sourceEncoding=UTF-8
