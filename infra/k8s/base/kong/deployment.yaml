apiVersion: apps/v1
kind: Deployment
metadata:
  name: kong
  namespace: chatbox
  labels:
    app.kubernetes.io/name: kong
    app.kubernetes.io/part-of: chatbox
    app.kubernetes.io/component: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kong
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kong
        app.kubernetes.io/part-of: chatbox
        app.kubernetes.io/component: gateway
    spec:
      serviceAccountName: kong
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: kong
          image: kong:3.6
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              protocol: TCP
            - containerPort: 8100
              name: metrics
              protocol: TCP
          env:
            - name: KONG_DATABASE
              value: "off"
            - name: KONG_DECLARATIVE_CONFIG
              value: "/etc/kong/kong.yml"
            - name: KONG_PROXY_LISTEN
              value: "0.0.0.0:8000"
            - name: KONG_ADMIN_LISTEN
              value: "off"
            - name: KONG_STATUS_LISTEN
              value: "0.0.0.0:8100"
            - name: KONG_LOG_LEVEL
              value: "info"
            - name: KONG_PREFIX
              value: "/kong-prefix"
            - name: KONG_NGINX_WORKER_PROCESSES
              value: "1"
          volumeMounts:
            - name: kong-config
              mountPath: /etc/kong
            - name: tmp
              mountPath: /tmp
            - name: kong-prefix
              mountPath: /kong-prefix
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
      volumes:
        - name: kong-config
          configMap:
            name: kong-config
        - name: tmp
          emptyDir: {}
        - name: kong-prefix
          emptyDir: {}
