apiVersion: v1
kind: ConfigMap
metadata:
  name: kong-config
  namespace: chatbox
  labels:
    app.kubernetes.io/name: kong
    app.kubernetes.io/part-of: chatbox
data:
  kong.yml: |
    _format_version: "3.0"
    _transform: true

    plugins:
      - name: cors
        config:
          origins:
            - "http://localhost:3000"
            - "http://localhost:5173"
            - "http://localhost:30000"
          methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
          headers: [Authorization, Content-Type, X-Request-ID]
          credentials: true
          preflight_continue: false
          private_network: true
      - name: request-transformer
        config:
          add:
            headers:
              - "X-Request-ID:$(uuid)"
      - name: response-transformer
        config:
          add:
            headers:
              - "X-Content-Type-Options: nosniff"
              - "X-Frame-Options: DENY"
              - "Referrer-Policy: strict-origin-when-cross-origin"
              - "X-XSS-Protection: 1; mode=block"
              - "Permissions-Policy: camera=(), microphone=(), geolocation=()"
      - name: rate-limiting
        config:
          minute: 100
          policy: local
          fault_tolerant: true
          hide_client_headers: false

    services:
      - name: auth-register
        url: http://auth-service:8001
        routes:
          - name: auth-register-route
            paths: [/auth/register]
            strip_path: false
            methods: [POST, OPTIONS]
        plugins:
          - name: rate-limiting
            config: { minute: 5, policy: local, fault_tolerant: true, hide_client_headers: false }
      - name: auth-login
        url: http://auth-service:8001
        routes:
          - name: auth-login-route
            paths: [/auth/login]
            strip_path: false
            methods: [POST, OPTIONS]
        plugins:
          - name: rate-limiting
            config: { minute: 10, policy: local, fault_tolerant: true, hide_client_headers: false }
      - name: auth-logout
        url: http://auth-service:8001
        routes:
          - name: auth-logout-route
            paths: [/auth/logout]
            strip_path: false
            methods: [POST, OPTIONS]
      - name: auth-ping
        url: http://auth-service:8001
        routes:
          - name: auth-ping-route
            paths: [/auth/ping]
            strip_path: false
            methods: [POST, OPTIONS]
      - name: auth-users
        url: http://auth-service:8001
        routes:
          - name: auth-users-route
            paths: [/auth/users]
            strip_path: false
            methods: [GET, OPTIONS]
      - name: auth-forgot-password
        url: http://auth-service:8001
        routes:
          - name: auth-forgot-password-route
            paths: [/auth/forgot-password]
            strip_path: false
            methods: [POST, OPTIONS]
        plugins:
          - name: rate-limiting
            config: { minute: 5, policy: local, fault_tolerant: true, hide_client_headers: false }
      - name: auth-reset-password
        url: http://auth-service:8001
        routes:
          - name: auth-reset-password-route
            paths: [/auth/reset-password]
            strip_path: false
            methods: [POST, OPTIONS]
        plugins:
          - name: rate-limiting
            config: { minute: 5, policy: local, fault_tolerant: true, hide_client_headers: false }
      - name: auth-profile
        url: http://auth-service:8001
        routes:
          - name: auth-profile-route
            paths: [/auth/profile]
            strip_path: false
            methods: [GET, PATCH, OPTIONS]
      - name: auth-2fa
        url: http://auth-service:8001
        routes:
          - name: auth-2fa-route
            paths: [/auth/2fa]
            strip_path: false
            methods: [GET, POST, OPTIONS]
        plugins:
          - name: rate-limiting
            config: { minute: 10, policy: local, fault_tolerant: true, hide_client_headers: false }
      - name: chat-service-rooms
        url: http://chat-service:8003
        routes:
          - name: chat-rooms-routes
            paths: [/rooms]
            strip_path: false
        plugins:
          - name: rate-limiting
            config: { minute: 30, policy: local, fault_tolerant: true, hide_client_headers: false }
      - name: chat-service-pm
        url: http://chat-service:8003
        routes:
          - name: chat-pm-routes
            paths: [/pm]
            strip_path: false
      - name: chat-service-admin
        url: http://chat-service:8003
        routes:
          - name: chat-admin-routes
            paths: [/admin]
            strip_path: false
      - name: chat-service-ws
        url: http://chat-service:8003
        # WebSocket connections are long-lived — set generous timeouts so Kong
        # does not close idle connections between ping/pong frames (default 60 s
        # would kill connections faster than the 30 s ping interval + 10 s pong
        # wait = 40 s read deadline on the server side).
        read_timeout: 86400000    # 24 h in ms — never time out an idle WS conn
        write_timeout: 86400000   # 24 h in ms
        connect_timeout: 60000    # 60 s — reasonable upstream connect timeout
        routes:
          - name: chat-ws-routes
            paths: [/ws]
            strip_path: false
            protocols: [http, https]
      - name: message-service
        url: http://message-service:8004
        routes:
          - name: message-routes
            paths: [/messages]
            strip_path: false
        plugins:
          - name: rate-limiting
            config: { minute: 30, policy: local, fault_tolerant: true, hide_client_headers: false }
      - name: file-service
        url: http://file-service:8005
        routes:
          - name: file-routes
            paths: [/files]
            strip_path: false
        plugins:
          - name: rate-limiting
            config: { minute: 20, policy: local, fault_tolerant: true, hide_client_headers: false }
      # Catch-all route: serves the React SPA for all paths not matched by the
      # API routes above. Kong matches by longest-prefix first, so /auth, /rooms
      # etc. are handled before this falls through to the frontend.
      - name: frontend
        url: http://frontend:80
        routes:
          - name: frontend-route
            paths: [/]
            strip_path: false
