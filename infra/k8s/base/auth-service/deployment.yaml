apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: chatbox
  labels:
    app.kubernetes.io/name: auth-service
    app.kubernetes.io/part-of: chatbox
    app.kubernetes.io/component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: auth-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: auth-service
        app.kubernetes.io/part-of: chatbox
        app.kubernetes.io/component: backend
    spec:
      serviceAccountName: auth-service
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - 'until nc -z postgres-postgresql.chatbox-infra.svc.cluster.local 5432; do echo "Waiting for Postgres..."; sleep 2; done'
          securityContext:
            allowPrivilegeEscalation: false
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - 'until nc -z redis-master.chatbox-infra.svc.cluster.local 6379; do echo "Waiting for Redis..."; sleep 2; done'
          securityContext:
            allowPrivilegeEscalation: false
        - name: wait-for-kafka
          image: busybox:1.36
          command:
            - sh
            - -c
            - 'until nc -z kafka.chatbox-infra.svc.cluster.local 9092; do echo "Waiting for Kafka..."; sleep 2; done'
          securityContext:
            allowPrivilegeEscalation: false
        - name: run-migrations
          image: auth-service:latest
          imagePullPolicy: IfNotPresent
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - configMapRef:
                name: chatbox-shared-config
            - secretRef:
                name: chatbox-infra-secrets
            - configMapRef:
                name: auth-service-config
            - secretRef:
                name: auth-service-secrets
            - secretRef:
                name: auth-admin-secret
          securityContext:
            allowPrivilegeEscalation: false
      containers:
        - name: auth-service
          image: auth-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8001
              protocol: TCP
          envFrom:
            - configMapRef:
                name: chatbox-shared-config
            - secretRef:
                name: chatbox-infra-secrets
            - configMapRef:
                name: auth-service-config
            - secretRef:
                name: auth-service-secrets
            - secretRef:
                name: auth-admin-secret
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 768Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
      volumes:
        - name: tmp
          emptyDir: {}
