apiVersion: v1
kind: Secret
metadata:
  name: auth-service-secrets
  namespace: chatbox
  labels:
    app.kubernetes.io/name: auth-service
    app.kubernetes.io/part-of: chatbox
type: Opaque
stringData:
  DATABASE_URL: "postgresql://chatbox:CHANGE_ME@postgres-postgresql.chatbox-infra.svc.cluster.local:5432/chatbox_auth"
  TOTP_ENCRYPTION_KEY: "CHANGE_ME"
---
apiVersion: v1
kind: Secret
metadata:
  name: auth-admin-secret
  namespace: chatbox
  labels:
    app.kubernetes.io/name: auth-service
    app.kubernetes.io/part-of: chatbox
type: Opaque
stringData:
  ADMIN_USERNAME: "admin"
  ADMIN_PASSWORD: "changeme"
