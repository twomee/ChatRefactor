apiVersion: batch/v1
kind: Job
metadata:
  name: kafka-init
  namespace: chatbox
  labels:
    app.kubernetes.io/part-of: chatbox
    app.kubernetes.io/component: init
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-kafka
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z kafka.chatbox-infra.svc.cluster.local 9092; do echo "Waiting for Kafka..."; sleep 2; done']
      containers:
        - name: kafka-init
          image: apache/kafka:latest
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -c
            - |
              set -e
              echo "=== Creating Kafka topics ==="
              BOOTSTRAP="--bootstrap-server kafka.chatbox-infra.svc.cluster.local:9092"
              /opt/kafka/bin/kafka-topics.sh $BOOTSTRAP --create --topic chat.messages --partitions 6 --replication-factor 1 --if-not-exists
              /opt/kafka/bin/kafka-topics.sh $BOOTSTRAP --create --topic chat.private  --partitions 3 --replication-factor 1 --if-not-exists
              /opt/kafka/bin/kafka-topics.sh $BOOTSTRAP --create --topic chat.events   --partitions 3 --replication-factor 1 --if-not-exists
              /opt/kafka/bin/kafka-topics.sh $BOOTSTRAP --create --topic chat.dlq      --partitions 1 --replication-factor 1 --if-not-exists
              /opt/kafka/bin/kafka-topics.sh $BOOTSTRAP --create --topic file.events   --partitions 3 --replication-factor 1 --if-not-exists
              /opt/kafka/bin/kafka-topics.sh $BOOTSTRAP --create --topic auth.events   --partitions 3 --replication-factor 1 --if-not-exists
              echo "=== Topics created ==="
              /opt/kafka/bin/kafka-topics.sh $BOOTSTRAP --list
