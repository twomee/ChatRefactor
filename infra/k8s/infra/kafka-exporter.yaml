apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-exporter
  namespace: chatbox-infra
  labels:
    app.kubernetes.io/name: kafka-exporter
    app.kubernetes.io/part-of: chatbox
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kafka-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kafka-exporter
        app.kubernetes.io/part-of: chatbox
    spec:
      containers:
        - name: kafka-exporter
          image: danielqsj/kafka-exporter:latest
          args:
            - --kafka.server=kafka.chatbox-infra.svc.cluster.local:9092
          ports:
            - containerPort: 9308
              name: metrics
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-exporter
  namespace: chatbox-infra
  labels:
    app.kubernetes.io/name: kafka-exporter
    app.kubernetes.io/part-of: chatbox
spec:
  selector:
    app.kubernetes.io/name: kafka-exporter
  ports:
    - name: metrics
      port: 9308
      targetPort: 9308
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: kafka-exporter
  namespace: chatbox-infra
  labels:
    app.kubernetes.io/name: kafka-exporter
    app.kubernetes.io/part-of: chatbox
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: kafka-exporter
  endpoints:
    - port: metrics
      interval: 30s
