## Bitnami Redis Helm values
## Install: helm install redis oci://registry-1.docker.io/bitnamicharts/redis
##          -n chatbox-infra -f infra/k8s/infra/helm-values/redis.yaml
##          --set auth.password=<your-password>

architecture: standalone

auth: {}

primary:
  persistence:
    size: 2Gi
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

metrics:
  enabled: true
  serviceMonitor:
    enabled: true
    namespace: chatbox-infra
    interval: 15s
