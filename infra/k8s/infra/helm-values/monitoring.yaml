## kube-prometheus-stack Helm values
## Install: helm install monitoring prometheus-community/kube-prometheus-stack
##          -n chatbox-monitoring -f infra/k8s/infra/helm-values/monitoring.yaml

grafana:
  service:
    type: NodePort
    nodePort: 30030
  adminPassword: admin
  sidecar:
    dashboards:
      enabled: true
      searchNamespace: chatbox-monitoring

prometheus:
  prometheusSpec:
    retention: 7d
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 10Gi
    # Watch ServiceMonitors in chatbox and chatbox-infra namespaces
    serviceMonitorNamespaceSelector:
      matchLabels:
        app.kubernetes.io/part-of: chatbox
    podMonitorNamespaceSelector:
      matchLabels:
        app.kubernetes.io/part-of: chatbox
    # Match ALL ServiceMonitors (not just release=monitoring)
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false

alertmanager:
  enabled: false
