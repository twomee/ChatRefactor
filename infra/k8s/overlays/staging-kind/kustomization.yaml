apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# staging-kind: Extends the staging overlay for local kind clusters.
# Overrides DockerHub image references to use locally-loaded kind images,
# and keeps Kong as NodePort so localhost:30080 remains accessible.
# Usage: kubectl apply -k infra/k8s/overlays/staging-kind
resources:
  - ../staging
patches:
  # Keep Kong as NodePort for local kind access (staging base uses ClusterIP)
  - path: patches/kong-service-nodeport.yaml
images:
  # Override DockerHub image names to use locally-loaded kind images
  - name: docker.io/DOCKERHUB_USER/chatbox-auth-service
    newName: auth-service
    newTag: latest
  - name: docker.io/DOCKERHUB_USER/chatbox-chat-service
    newName: chat-service
    newTag: latest
  - name: docker.io/DOCKERHUB_USER/chatbox-message-service
    newName: message-service
    newTag: latest
  - name: docker.io/DOCKERHUB_USER/chatbox-file-service
    newName: file-service
    newTag: latest
  - name: docker.io/DOCKERHUB_USER/chatbox-frontend
    newName: frontend
    newTag: latest
