version: 2

# Suppress false positives from test fixtures.
# Test directories contain intentionally fake/mock credentials used in unit
# tests — they are never real secrets.
#
# In ggshield v2 config the scan settings live under the `secret` key.
# The correct field name is `ignored_paths` (not `paths-ignore`).
secret:
  ignored_paths:
    # JavaScript / TypeScript test directories (Vitest / Jest)
    - "**/__tests__/**"
    - "**/*.test.js"
    - "**/*.test.jsx"
    - "**/*.test.ts"
    - "**/*.test.tsx"
    - "**/*.spec.js"
    - "**/*.spec.jsx"
    - "**/*.spec.ts"
    - "**/*.spec.tsx"
    # Python test files (pytest convention: test_*.py in tests/ dirs)
    - "**/tests/test_*.py"
    - "**/tests/conftest.py"
    - "services/*/tests/**"
    # Go test files (co-located with source, named *_test.go)
    - "**/*_test.go"
    # ── Explicit service test paths ──────────────────────────────────────
    - "services/auth-service/tests/**"
    - "services/chat-service/tests/**"
    - "services/file-service/tests/**"
    - "services/message-service/tests/**"
    # ── Playwright e2e UI tests ──────────────────────────────────────────
    # All files under tests/e2e-ui contain intentionally fake credentials
    # (throwaway test users registered against a local CI environment).
    - "tests/e2e-ui/**"
    # ── Documentation ────────────────────────────────────────────────────
    # Docs may include code snippets that show example/placeholder values.
    - "docs/**"
