version: 2

# Suppress false positives from test fixtures.
# Test directories contain intentionally fake/mock credentials used in unit
# tests — they are never real secrets.  Using paths-ignore avoids embedding
# the mock secret strings in this config file (which would itself be flagged).
#
# In ggshield v2 config the scan settings live under the `secret` key.
secret:
  paths-ignore:
    # JavaScript / TypeScript test directories (Vitest / Jest)
    - "**/__tests__/**"
    - "**/*.test.js"
    - "**/*.test.jsx"
    - "**/*.test.ts"
    - "**/*.test.tsx"
    - "**/*.spec.js"
    - "**/*.spec.jsx"
    - "**/*.spec.ts"
    - "**/*.spec.tsx"
    # Python test files (pytest convention: test_*.py in tests/ dirs)
    - "**/tests/test_*.py"
    - "**/tests/conftest.py"
    - "services/*/tests/**"
    # Go test files (co-located with source, named *_test.go)
    - "**/*_test.go"
    # ── Explicit service test paths ──────────────────────────────────────
    # auth-service (Python / pytest)
    - "services/auth-service/tests/**"
    # chat-service (Go)
    - "services/chat-service/cmd/server/main_test.go"
    - "services/chat-service/internal/client/**/*_test.go"
    - "services/chat-service/internal/config/**/*_test.go"
    - "services/chat-service/internal/delivery/**/*_test.go"
    - "services/chat-service/internal/handler/**/*_test.go"
    - "services/chat-service/internal/kafka/**/*_test.go"
    - "services/chat-service/internal/metrics/**/*_test.go"
    - "services/chat-service/internal/middleware/**/*_test.go"
    - "services/chat-service/internal/store/**/*_test.go"
    - "services/chat-service/internal/ws/**/*_test.go"
    - "services/chat-service/tests/**"
    # file-service (TypeScript / Jest)
    - "services/file-service/tests/**"
    # message-service (Python / pytest)
    - "services/message-service/tests/**"
