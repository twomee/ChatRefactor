<!DOCTYPE html>

<html>
<head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" /> 
	<title>Login</title>
    <link href="Css/like.css" rel="stylesheet" type="text/css" />
        <script type = "text/javascript">
            function CheckFname(that) {
                str = that.value;
                if (str == "") {
                    alert("חובה להכניס שם פרטי!");
                    that.select();
                    return false;
                }
				return true;
			}

            function CheckPass(that) {
                pass = that.value;
                if (pass.length == 0) {
                    alert("חובה למלא סיסמא!");
                    that.select();
                    return false;
                }
				return true;
            }
			
            function CheckForm(that) {
                if (CheckFname(that.name) && CheckPass(that.pass)) {
                    alert("הנתונים נשלחו!");
                    return true;
                }
                return false;
            }
 </script>

</head>
<body>
<header>
</header>
            <div class="For_Text">
            <p class="center"><h3>פרטי משתמש</h3></p><br />
            <form name = "register"  method="post" onsubmit = "return CheckForm(this)" action="login.html">
                <ul class="table">
						שם משתמש:<li><input type = "text" class="inputs" name = "name"  /></li>
						
                        סיסמא:<li><input type = "password" class="inputs" name ="pass" maxlength = "20" /></li>
				<input type="submit" name="submit"  value="התחבר" class = "button3"/>
                <input type="reset" value="אפס טופס" class = "button3" onclick="return confirm('את\ה בטוח\ה שברצונך לאפס את הטופס?')" />
                </ul>
            </form>
            </div>
</body>
</html>
